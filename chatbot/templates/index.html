<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura — AI Assistant</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ── 1. Design Tokens ──────────────────────────────────────── */
    :root {
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      /* Accent palette */
      --accent-1: #6C63FF;
      --accent-2: #3ECFCF;
      --accent-grad: linear-gradient(135deg, var(--accent-1), var(--accent-2));

      /* Radii */
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;
      --r-full: 9999px;

      /* Transitions */
      --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
      --ease-smooth: cubic-bezier(.4, 0, .2, 1);
      --dur-fast: 150ms;
      --dur-base: 250ms;
      --dur-slow: 400ms;
    }

    /* Dark theme (default) */
    [data-theme="dark"] {
      --bg-base: #0d0d10;
      --bg-surface: #141418;
      --bg-elevated: #1c1c22;
      --bg-glass: rgba(28, 28, 34, 0.65);
      --bg-input: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.15);

      --text-primary: #f0f0f5;
      --text-secondary: #9090a8;
      --text-muted: #5a5a70;

      --msg-user-bg: linear-gradient(135deg, rgba(108, 99, 255, .35), rgba(62, 207, 207, .2));
      --msg-user-border: rgba(108, 99, 255, .4);
      --msg-ai-bg: rgba(255, 255, 255, 0.04);
      --msg-ai-border: rgba(255, 255, 255, 0.07);

      --sidebar-bg: rgba(12, 12, 16, 0.85);
      --shadow-glow: 0 0 40px rgba(108, 99, 255, .12);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, .4);

      --orb-1: rgba(108, 99, 255, .18);
      --orb-2: rgba(62, 207, 207, .12);
      --orb-3: rgba(255, 100, 150, .08);

      --error-bg: rgba(255, 75, 75, .12);
      --error-border: rgba(255, 75, 75, .3);
      --error-text: #ff7777;
    }

    /* Light theme */
    [data-theme="light"] {
      --bg-base: #f4f4f8;
      --bg-surface: #ffffff;
      --bg-elevated: #ffffff;
      --bg-glass: rgba(255, 255, 255, 0.8);
      --bg-input: rgba(0, 0, 0, 0.04);
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.15);

      --text-primary: #18181f;
      --text-secondary: #55556a;
      --text-muted: #9090a8;

      --msg-user-bg: linear-gradient(135deg, rgba(108, 99, 255, .12), rgba(62, 207, 207, .08));
      --msg-user-border: rgba(108, 99, 255, .25);
      --msg-ai-bg: rgba(0, 0, 0, 0.03);
      --msg-ai-border: rgba(0, 0, 0, 0.07);

      --sidebar-bg: rgba(244, 244, 248, 0.95);
      --shadow-glow: 0 0 40px rgba(108, 99, 255, .08);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, .08);

      --orb-1: rgba(108, 99, 255, .10);
      --orb-2: rgba(62, 207, 207, .08);
      --orb-3: rgba(255, 100, 150, .05);

      --error-bg: rgba(255, 75, 75, .08);
      --error-border: rgba(255, 75, 75, .25);
      --error-text: #cc4444;
    }

    /* ── 2. Reset & Base ────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      overflow: hidden;
      transition: background var(--dur-slow) var(--ease-smooth),
        color var(--dur-slow) var(--ease-smooth);
    }

    /* ── 3. Ambient Background ──────────────────────────────────── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: drift 20s ease-in-out infinite;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      top: -200px;
      left: -100px;
      background: var(--orb-1);
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      bottom: -100px;
      right: -50px;
      background: var(--orb-2);
      animation-delay: -7s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      top: 40%;
      left: 50%;
      background: var(--orb-3);
      animation-delay: -14s;
    }

    @keyframes drift {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(40px, -30px) scale(1.05);
      }

      66% {
        transform: translate(-30px, 40px) scale(.95);
      }
    }

    /* ── 4. App Shell ───────────────────────────────────────────── */
    .app-shell {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    /* ── 5. Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 16px;
      gap: 8px;
      transition: transform var(--dur-base) var(--ease-smooth),
        background var(--dur-slow) var(--ease-smooth);
      overflow-y: auto;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: var(--r-sm);
      background: var(--accent-grad);
      display: grid;
      place-items: center;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(108, 99, 255, .4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(108, 99, 255, 0);
      }
    }

    .logo-inner {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      opacity: .9;
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .02em;
      color: var(--text-primary);
    }

    .sidebar-close {
      display: none;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-md);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: .875rem;
      padding: 10px 14px;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-smooth);
      width: 100%;
    }

    .new-chat-btn:hover {
      background: var(--bg-input);
      color: var(--text-primary);
      border-color: var(--accent-1);
    }

    .sidebar-section-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 4px 4px;
    }

    .chat-history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: .8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
      transition: all var(--dur-fast) var(--ease-smooth);
    }

    .history-item:hover {
      background: var(--bg-input);
      color: var(--text-primary);
      border-color: var(--border);
    }

    .history-item i {
      flex-shrink: 0;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .theme-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: .95rem;
      padding: 4px 4px;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--bg-input);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-full);
      transition: all var(--dur-base) var(--ease-smooth);
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: var(--text-secondary);
      border-radius: 50%;
      transition: transform var(--dur-base) var(--ease-spring);
    }

    .toggle-switch input:checked+.slider {
      background: var(--accent-1);
      border-color: var(--accent-1);
    }

    .toggle-switch input:checked+.slider::before {
      transform: translateX(18px);
      background: white;
    }

    /* ── 6. Sidebar Backdrop ────────────────────────────────────── */
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(4px);
      z-index: 40;
    }

    /* ── 7. Main Area ───────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── 8. Topbar ──────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
    }

    .avatar-pulse {
      position: relative;
      width: 10px;
      height: 10px;
    }

    .avatar-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3ECFCF;
    }

    .avatar-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1.5px solid rgba(62, 207, 207, .4);
      animation: ping 2s ease-out infinite;
    }

    @keyframes ping {
      0% {
        transform: scale(1);
        opacity: .6;
      }

      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    .status-chip {
      font-family: var(--font-body);
      font-size: .65rem;
      font-weight: 500;
      color: #3ECFCF;
      background: rgba(62, 207, 207, .1);
      border: 1px solid rgba(62, 207, 207, .25);
      border-radius: var(--r-full);
      padding: 2px 8px;
      letter-spacing: .04em;
    }

    /* ── 9. Icon Buttons ────────────────────────────────────────── */
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-secondary);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all var(--dur-fast) var(--ease-smooth);
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }

    /* ── 10. Chat Window ────────────────────────────────────────── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .chat-window::-webkit-scrollbar {
      width: 4px;
    }

    .chat-window::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-window::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: var(--r-full);
    }

    /* ── 11. Welcome State ──────────────────────────────────────── */
    .welcome-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 40px 20px;
      flex: 1;
      animation: fadeUp .5s var(--ease-smooth) both;
    }

    .welcome-avatar {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 8px;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: var(--accent-grad) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .avatar-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
    }

    .avatar-core svg {
      width: 100%;
      height: 100%;
    }

    .welcome-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-sub {
      color: var(--text-secondary);
      font-size: .95rem;
      max-width: 380px;
      line-height: 1.6;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
      max-width: 520px;
    }

    .chip {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-full);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: .8rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-smooth);
    }

    .chip:hover {
      background: var(--bg-input);
      color: var(--text-primary);
      border-color: var(--accent-1);
      transform: translateY(-1px);
    }

    /* ── 12. Message Bubbles ────────────────────────────────────── */
    .message-group {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      animation: fadeUp .3s var(--ease-smooth) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-group.user {
      flex-direction: row-reverse;
    }

    /* AI avatar in messages */
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--r-sm);
      background: var(--accent-grad);
      flex-shrink: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .msg-avatar svg {
      width: 100%;
      height: 100%;
    }

    .msg-avatar.user-av {
      background: linear-gradient(135deg, #6C63FF, #9B8FFF);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: .8rem;
      color: white;
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: min(520px, 80%);
    }

    .message-group.user .msg-content {
      align-items: flex-end;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--r-lg);
      font-size: .9rem;
      line-height: 1.65;
      word-break: break-word;
      border: 1px solid transparent;
      position: relative;
    }

    /* User bubble */
    .message-group.user .bubble {
      background: var(--msg-user-bg);
      border-color: var(--msg-user-border);
      border-bottom-right-radius: var(--r-sm);
    }

    /* AI bubble */
    .message-group.ai .bubble {
      background: var(--msg-ai-bg);
      border-color: var(--msg-ai-border);
      border-bottom-left-radius: var(--r-sm);
    }

    /* Markdown inside bubbles */
    .bubble p {
      margin: 0 0 .5em;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble code {
      background: rgba(108, 99, 255, .15);
      border: 1px solid rgba(108, 99, 255, .2);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .82em;
      font-family: 'Courier New', monospace;
    }

    .bubble pre {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .bubble ul,
    .bubble ol {
      padding-left: 1.4em;
    }

    .bubble strong {
      color: var(--text-primary);
    }

    .msg-meta {
      font-size: .68rem;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ── 13. Typing Indicator ───────────────────────────────────── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px 4px;
      animation: fadeUp .2s var(--ease-smooth) both;
    }

    .typing-indicator.hidden {
      display: none;
    }

    .typing-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--r-sm);
      overflow: hidden;
      flex-shrink: 0;
    }

    .typing-avatar svg {
      width: 100%;
      height: 100%;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      background: var(--msg-ai-bg);
      border: 1px solid var(--msg-ai-border);
      border-radius: var(--r-full);
      padding: 10px 14px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes typingBounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* ── 14. Error Banner ───────────────────────────────────────── */
    .error-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 20px 8px;
      padding: 10px 14px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--r-md);
      color: var(--error-text);
      font-size: .85rem;
      animation: slideDown .2s var(--ease-smooth);
    }

    .error-banner.hidden {
      display: none;
    }

    .error-banner span {
      flex: 1;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── 15. Input Bar ──────────────────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-xl);
      padding: 10px 10px 10px 18px;
      transition: border-color var(--dur-fast) var(--ease-smooth),
        box-shadow var(--dur-fast) var(--ease-smooth);
    }

    .input-wrap:focus-within {
      border-color: rgba(108, 99, 255, .5);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, .1);
    }

    textarea#messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-body);
      font-size: .9rem;
      color: var(--text-primary);
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
    }

    textarea#messageInput::placeholder {
      color: var(--text-muted);
    }

    textarea#messageInput::-webkit-scrollbar {
      width: 2px;
    }

    textarea#messageInput::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 2px;
    }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Mic button */
    .mic-btn {
      border-radius: var(--r-full);
    }

    .mic-btn.recording {
      background: rgba(255, 75, 75, .15);
      border-color: rgba(255, 75, 75, .4);
      color: #ff5555;
      animation: micPulse 1s ease-in-out infinite;
    }

    @keyframes micPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 75, 75, .3);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(255, 75, 75, 0);
      }
    }

    /* Send button */
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r-full);
      background: var(--accent-grad);
      border: none;
      color: white;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all var(--dur-fast) var(--ease-spring);
      flex-shrink: 0;
    }

    .send-btn:disabled {
      opacity: .3;
      cursor: not-allowed;
      transform: none !important;
    }

    .send-btn:not(:disabled):hover {
      transform: scale(1.08);
    }

    .send-btn:not(:disabled):active {
      transform: scale(.95);
    }

    .input-hint {
      text-align: center;
      font-size: .68rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── 16. Utility ────────────────────────────────────────────── */
    .hidden {
      display: none !important;
    }

    /* ── 17. Responsive ─────────────────────────────────────────── */
    @media (max-width: 768px) {

      /* Sidebar becomes an overlay */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        width: 280px;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-close {
        display: grid;
      }

      .sidebar-backdrop {
        display: block;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--dur-base);
      }

      .sidebar-backdrop.show {
        opacity: 1;
        pointer-events: all;
      }

      .chat-window {
        padding: 16px 12px;
      }

      .msg-content {
        max-width: 90%;
      }

      .input-bar {
        padding: 8px 12px 12px;
      }

      .topbar {
        padding: 12px 12px;
      }

      .welcome-state {
        padding: 24px 12px;
      }

      .suggestion-chips {
        gap: 6px;
      }

      .chip {
        font-size: .75rem;
      }
    }

    @media (max-width: 400px) {
      .bubble {
        padding: 10px 13px;
        font-size: .85rem;
      }

      .send-btn,
      .icon-btn {
        width: 32px;
        height: 32px;
      }
    }

    /* ── 18. Focus accessibility ────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--accent-1);
      outline-offset: 2px;
    }

    button:focus-visible,
    textarea:focus-visible {
      outline-offset: 3px;
    }
  </style>
</head>

<body>

  <!-- ── Ambient background orbs ─────────────────────────────────────── -->
  <div class="ambient" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ── App shell ──────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">
            <span class="logo-inner"></span>
          </div>
          <span class="logo-text">Aura</span>
        </div>
        <button class="icon-btn sidebar-close" id="sidebarClose" aria-label="Close sidebar">
          <i class="ph ph-x"></i>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <i class="ph ph-plus"></i>
        New conversation
      </button>

      <div class="sidebar-section-label">Recent</div>
      <div class="chat-history-list" id="chatHistoryList">
        <!-- Populated by JS -->
      </div>

      <div class="sidebar-footer">
        <div class="theme-toggle-wrap">
          <i class="ph ph-sun"></i>
          <label class="toggle-switch" aria-label="Toggle theme">
            <input type="checkbox" id="themeToggle" checked />
            <span class="slider"></span>
          </label>
          <i class="ph ph-moon"></i>
        </div>
      </div>
    </aside>

    <!-- Backdrop for mobile sidebar -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Main area -->
    <main class="main">

      <!-- Top bar -->
      <header class="topbar">
        <button class="icon-btn" id="sidebarOpen" aria-label="Open sidebar">
          <i class="ph ph-list"></i>
        </button>
        <div class="topbar-title">
          <div class="avatar-pulse">
            <div class="avatar-dot"></div>
          </div>
          <span>Aura</span>
          <span class="status-chip">Online</span>
        </div>
        <button class="icon-btn" id="clearChat" aria-label="Clear chat">
          <i class="ph ph-trash"></i>
        </button>
      </header>

      <!-- Chat window -->
      <div class="chat-window" id="chatWindow" role="log" aria-live="polite">

        <!-- Welcome state (hidden once chat starts) -->
        <div class="welcome-state" id="welcomeState">
          <div class="welcome-avatar">
            <div class="avatar-ring"></div>
            <div class="avatar-core">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="22" fill="url(#grad)" />
                <path d="M16 26c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="white" stroke-width="2.5"
                  stroke-linecap="round" />
                <circle cx="19" cy="20" r="2" fill="white" />
                <circle cx="29" cy="20" r="2" fill="white" />
                <defs>
                  <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#6C63FF" />
                    <stop offset="1" stop-color="#3ECFCF" />
                  </linearGradient>
                </defs>
              </svg>
            </div>
          </div>
          <h1 class="welcome-title">Hello, I'm Aura</h1>
          <p class="welcome-sub">Your intelligent AI companion. Ask me anything — I'm ready to help.</p>
          <div class="suggestion-chips" id="suggestionChips">
            <button class="chip">✦ Explain quantum computing simply</button>
            <button class="chip">✦ Write a Python web scraper</button>
            <button class="chip">✦ Best practices for REST APIs</button>
            <button class="chip">✦ Summarise the last decade in AI</button>
          </div>
        </div>

        <!-- Messages are injected here by JS -->
      </div>

      <!-- Typing indicator (hidden by default) -->
      <div class="typing-indicator hidden" id="typingIndicator" aria-label="Aura is typing">
        <div class="typing-avatar">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="11" fill="url(#tg)" />
            <path d="M8 13c0-2.21 1.79-4 4-4s4 1.79 4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" />
            <circle cx="9.5" cy="10" r="1" fill="white" />
            <circle cx="14.5" cy="10" r="1" fill="white" />
            <defs>
              <linearGradient id="tg" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#3ECFCF" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Error banner -->
      <div class="error-banner hidden" id="errorBanner" role="alert">
        <i class="ph ph-warning-circle"></i>
        <span id="errorText">Something went wrong.</span>
        <button class="icon-btn" id="errorClose" aria-label="Dismiss error">
          <i class="ph ph-x"></i>
        </button>
      </div>

      <!-- Input bar -->
      <div class="input-bar">
        <div class="input-wrap" id="inputWrap">
          <textarea id="messageInput" rows="1" placeholder="Message Aura…" aria-label="Chat message input"
            autocomplete="off" spellcheck="true"></textarea>
          <div class="input-actions">
            <button class="icon-btn mic-btn" id="micBtn" aria-label="Voice input" title="Hold to speak">
              <i class="ph ph-microphone" id="micIcon"></i>
            </button>
            <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
              <i class="ph ph-paper-plane-tilt"></i>
            </button>
          </div>
        </div>
        <p class="input-hint">Aura can make mistakes. Verify important information.</p>
      </div>

    </main>
  </div>

  <script>
    /**
   * app.js — Aura AI Chatbot
   * Handles: chat messaging, voice I/O, theme toggle,
   *          local storage, sidebar, and UI animations.
   */

    /* ── 1. DOM references ──────────────────────────────────────── */
    const chatWindow = document.getElementById('chatWindow');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const micIcon = document.getElementById('micIcon');
    const typingIndicator = document.getElementById('typingIndicator');
    const errorBanner = document.getElementById('errorBanner');
    const errorText = document.getElementById('errorText');
    const errorClose = document.getElementById('errorClose');
    const themeToggle = document.getElementById('themeToggle');
    const clearChatBtn = document.getElementById('clearChat');
    const newChatBtn = document.getElementById('newChatBtn');
    const sidebarOpen = document.getElementById('sidebarOpen');
    const sidebarClose = document.getElementById('sidebarClose');
    const sidebar = document.getElementById('sidebar');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');
    const welcomeState = document.getElementById('welcomeState');
    const chatHistoryList = document.getElementById('chatHistoryList');
    const suggestionChips = document.getElementById('suggestionChips');

    /* ── 2. State ───────────────────────────────────────────────── */
    let conversationHistory = [];   // [{ role, content }]
    let isLoading = false;
    let currentSessionId = generateId();

    /* ── 3. Local Storage helpers ───────────────────────────────── */
    const STORAGE_KEY = 'aura_sessions';

    /** Persist the current session to localStorage. */
    function saveSession() {
      try {
        const sessions = getSessions();
        if (conversationHistory.length === 0) return;
        sessions[currentSessionId] = {
          id: currentSessionId,
          title: getTitleFromHistory(),
          messages: conversationHistory,
          updatedAt: Date.now(),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        renderHistoryList();
      } catch (_) { /* storage full — silently ignore */ }
    }

    function getSessions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch { return {}; }
    }

    function getTitleFromHistory() {
      const first = conversationHistory.find(m => m.role === 'user');
      return first ? first.content.slice(0, 40) + (first.content.length > 40 ? '…' : '') : 'New chat';
    }

    function generateId() {
      return 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    }

    /** Render the sidebar history list from localStorage. */
    function renderHistoryList() {
      const sessions = getSessions();
      const sorted = Object.values(sessions).sort((a, b) => b.updatedAt - a.updatedAt).slice(0, 20);

      chatHistoryList.innerHTML = '';
      sorted.forEach(sess => {
        const item = document.createElement('button');
        item.className = 'history-item';
        item.innerHTML = `<i class="ph ph-chat-circle"></i>${escapeHtml(sess.title)}`;
        item.addEventListener('click', () => loadSession(sess.id));
        chatHistoryList.appendChild(item);
      });
    }

    /** Load a past session into the chat window. */
    function loadSession(id) {
      const sessions = getSessions();
      const sess = sessions[id];
      if (!sess) return;

      clearChatUI();
      currentSessionId = id;
      conversationHistory = sess.messages;

      conversationHistory.forEach(msg => {
        appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, msg.timestamp);
      });

      closeSidebar();
    }

    /* ── 4. Theme ───────────────────────────────────────────────── */
    (function initTheme() {
      const saved = localStorage.getItem('aura_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      themeToggle.checked = (saved === 'dark');
    })();

    themeToggle.addEventListener('change', () => {
      const theme = themeToggle.checked ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('aura_theme', theme);
    });

    /* ── 5. Sidebar ─────────────────────────────────────────────── */
    function openSidebar() {
      sidebar.classList.add('open');
      sidebarBackdrop.classList.add('show');
      renderHistoryList();
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarBackdrop.classList.remove('show');
    }

    sidebarOpen.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);
    sidebarBackdrop.addEventListener('click', closeSidebar);

    /* ── 6. Suggestion chips ────────────────────────────────────── */
    suggestionChips.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const text = chip.textContent.replace(/^✦\s*/, '').trim();
        messageInput.value = text;
        adjustTextarea();
        sendBtn.disabled = false;
        sendMessage();
      });
    });

    /* ── 7. Input handling ──────────────────────────────────────── */

    /** Auto-resize textarea as user types. */
    function adjustTextarea() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    }

    messageInput.addEventListener('input', () => {
      adjustTextarea();
      sendBtn.disabled = messageInput.value.trim().length === 0;
    });

    /** Enter sends; Shift+Enter inserts newline. */
    messageInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled && !isLoading) sendMessage();
      }
    });

    sendBtn.addEventListener('click', () => {
      if (!isLoading) sendMessage();
    });

    /* ── 8. Send message ────────────────────────────────────────── */
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isLoading) return;

      // Hide welcome state on first message
      if (welcomeState && !welcomeState.classList.contains('hidden')) {
        welcomeState.classList.add('hidden');
      }

      // Append user bubble
      const timestamp = Date.now();
      appendMessage('user', text, timestamp);
      conversationHistory.push({ role: 'user', content: text, timestamp });

      // Clear input
      messageInput.value = '';
      adjustTextarea();
      sendBtn.disabled = true;
      hideError();

      // Show typing indicator
      setLoading(true);

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history: conversationHistory.map(({ role, content }) => ({ role, content })),
          }),
        });

        const textResponse = await response.text();

        let data;

        try {
          data = JSON.parse(textResponse);
        } catch {
          console.error("Server returned invalid JSON:", textResponse);
          throw new Error("Server error. Check Flask terminal.");
        }

        if (!response.ok) {
          throw new Error(data.error || `Server error ${response.status}`);
        }

        const reply = data.reply || '(No response)';
        const ts = data.timestamp || Date.now();

        // Append AI bubble
        appendMessage('ai', reply, ts);
        conversationHistory.push({ role: 'assistant', content: reply, timestamp: ts });

        // Speak response
        speak(reply);

        // Save to localStorage
        saveSession();

      } catch (err) {
        showError(err.message || 'Could not reach the server. Check your connection.');
      } finally {
        setLoading(false);
      }
    }

    /* ── 9. DOM helpers ─────────────────────────────────────────── */

    /**
     * Append a message bubble to the chat window.
     * @param {'user'|'ai'} role
     * @param {string}      content
     * @param {number}      timestamp  — Unix ms
     */
    function appendMessage(role, content, timestamp) {
      const group = document.createElement('div');
      group.className = `message-group ${role}`;

      const isUser = role === 'user';

      // Avatar
      const avatar = document.createElement('div');
      avatar.className = isUser ? 'msg-avatar user-av' : 'msg-avatar';
      if (isUser) {
        avatar.textContent = 'You';
      } else {
        avatar.innerHTML = `
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="url(#ag)"/>
        <path d="M10 17c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="13" cy="13.5" r="1.5" fill="white"/>
        <circle cx="19" cy="13.5" r="1.5" fill="white"/>
        <defs>
          <linearGradient id="ag" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6C63FF"/><stop offset="1" stop-color="#3ECFCF"/>
          </linearGradient>
        </defs>
      </svg>`;
      }

      // Bubble content
      const msgContent = document.createElement('div');
      msgContent.className = 'msg-content';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (isUser) {
        bubble.textContent = content;
      } else {
        // Render markdown for AI responses
        bubble.innerHTML = marked.parse(content, { breaks: true, gfm: true });
      }

      // Timestamp
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = formatTimestamp(timestamp);

      msgContent.appendChild(bubble);
      msgContent.appendChild(meta);

      if (isUser) {
        group.appendChild(msgContent);
        group.appendChild(avatar);
      } else {
        group.appendChild(avatar);
        group.appendChild(msgContent);
      }

      chatWindow.appendChild(group);
      scrollToBottom();
    }

    /** Smoothly scroll chat to the bottom. */
    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
      });
    }

    /** Show/hide the typing indicator and loading state. */
    function setLoading(state) {
      isLoading = state;
      typingIndicator.classList.toggle('hidden', !state);
      if (state) scrollToBottom();
    }

    /** Show error banner. */
    function showError(msg) {
      errorText.textContent = msg;
      errorBanner.classList.remove('hidden');
    }
    function hideError() {
      errorBanner.classList.add('hidden');
    }
    errorClose.addEventListener('click', hideError);

    /** Clear the chat UI (not localStorage). */
    function clearChatUI() {
      // Remove all message groups but keep welcome state structure
      Array.from(chatWindow.querySelectorAll('.message-group')).forEach(el => el.remove());
      welcomeState.classList.remove('hidden');
    }

    /** Clear current session and start fresh. */
    function startNewChat() {
      conversationHistory = [];
      currentSessionId = generateId();
      clearChatUI();
      stopSpeaking();
      hideError();
    }

    clearChatBtn.addEventListener('click', startNewChat);
    newChatBtn.addEventListener('click', () => { startNewChat(); closeSidebar(); });

    /* ── 10. Utilities ──────────────────────────────────────────── */
    function formatTimestamp(ms) {
      const d = new Date(ms);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── 11. Voice Input (Web Speech API) ───────────────────────── */
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add('recording');
        micIcon.className = 'ph ph-microphone-slash';
        micBtn.title = 'Click to stop';
      };

      recognition.onresult = event => {
        const transcript = Array.from(event.results)
          .map(r => r[0].transcript)
          .join('');
        messageInput.value = transcript;
        adjustTextarea();
        sendBtn.disabled = transcript.trim().length === 0;
      };

      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove('recording');
        micIcon.className = 'ph ph-microphone';
        micBtn.title = 'Hold to speak';

        // Auto-send if there's a transcript
        if (messageInput.value.trim()) sendMessage();
      };

      recognition.onerror = err => {
        isRecording = false;
        micBtn.classList.remove('recording');
        micIcon.className = 'ph ph-microphone';
        if (err.error !== 'aborted') {
          showError('Microphone error: ' + err.error);
        }
      };

      micBtn.addEventListener('click', () => {
        if (isRecording) {
          recognition.stop();
        } else {
          hideError();
          recognition.start();
        }
      });

    } else {
      // Browser doesn't support speech recognition
      micBtn.title = 'Voice input not supported in this browser';
      micBtn.style.opacity = '0.4';
      micBtn.disabled = true;
    }

    /* ── 12. Voice Output (Web Speech Synthesis) ────────────────── */
    function speak(text) {
      if (!window.speechSynthesis) return;

      // Strip markdown syntax for cleaner TTS
      const clean = text
        .replace(/```[\s\S]*?```/g, 'code block')
        .replace(/`[^`]+`/g, '')
        .replace(/#{1,6}\s/g, '')
        .replace(/\*{1,2}([^*]+)\*{1,2}/g, '$1')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .slice(0, 500);  // limit length for TTS

      const utterance = new SpeechSynthesisUtterance(clean);
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 0.9;

      // Prefer a natural-sounding voice if available
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.includes('Samantha') ||
        v.name.includes('Google UK English Female') ||
        v.name.includes('Karen') ||
        (v.lang === 'en-US' && !v.name.includes('Microsoft'))
      );
      if (preferred) utterance.voice = preferred;

      speechSynthesis.cancel();  // stop any current speech
      speechSynthesis.speak(utterance);
    }

    function stopSpeaking() {
      if (window.speechSynthesis) speechSynthesis.cancel();
    }

    /* Wait for voices to load (Chrome bug workaround) */
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
    }

    /* ── 13. Init ───────────────────────────────────────────────── */
    renderHistoryList();
    messageInput.focus();

  </script>">
</body>
